[env:esp32s3]
; ESP32-S3 N16R8 board configuration
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts = pre:patch_tft.py

; Board specific settings for ESP32-S3 N16R8
board_build.partitions = custom_partitions.csv
board_build.filesystem = spiffs
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

; Optimize for small size
build_flags = 
    -Os
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM                  ; Enable 8MB Octal PSRAM on N16R8
    -DARDUINO_RUNNING_CORE=1           ; Run Arduino on core 1
    -DCONFIG_SPIRAM_USE_MALLOC=1       ; Route ps_malloc() to PSRAM
    -DCONFIG_SPIRAM_IGNORE_NOTFOUND=1  ; Don't crash if PSRAM not found
    -DARDUINO_USB_MODE=1               ; Use Native USB
    -DARDUINO_USB_CDC_ON_BOOT=1        ; Keep COM port alive for Serial
    ; Uncomment the line below to enable debug Serial output (increases flash usage)
    ; -DDEBUG_SERIAL
    -I include
    -I lib                                                                                                      
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D LV_CONF_INCLUDE_SIMPLE
    -DUSER_SETUP_LOADED=1
    -DST7796_DRIVER=1
    -D TOUCH_XPT2046
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_MOSI=13
    -D TFT_MISO=12
    -D TFT_SCLK=14
    -D TFT_CS=4
    -D TFT_DC=9
    -D TFT_RST=15
    -D TFT_BL=11
    -D TOUCH_CS=18
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF
    -D SMOOTH_FONT
    -D SPI_FREQUENCY=10000000
    -D SPI_READ_FREQUENCY=10000000
    -D SPI_TOUCH_FREQUENCY=2500000

; Monitor settings for serial output
monitor_speed = 115200

; Library dependencies for the project
lib_deps = 
    bodmer/TFT_eSPI @ ^2.5.43
    adafruit/Adafruit BusIO@^1.15.0
    adafruit/DHT sensor library@^1.4.6
    milesburton/DallasTemperature@^3.11.0
    bogde/HX711@^0.7.5

    adafruit/Adafruit GFX Library@^1.11.9
    miguelbalboa/MFRC522@^1.4.10
    lvgl/lvgl@^8.3.11
    zinggjm/GxEPD2@^1.5.8
    ;knolleary/PubSubClient@^2.8

upload_protocol = esptool

[platformio]
include_dir = include
src_dir = src
lib_dir = lib
data_dir = data
