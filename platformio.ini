[env:esp32s3]
; ESP32-S3 N16R8 board configuration
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Board specific settings for ESP32-S3 N16R8
board_build.partitions = custom_partitions.csv
board_build.filesystem = spiffs
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

; Optimize for small size
build_flags = 
    -Os
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM                  ; Enable 8MB Octal PSRAM on N16R8
    -DARDUINO_RUNNING_CORE=1           ; Run Arduino on core 1
    -DCONFIG_SPIRAM_USE_MALLOC=1       ; Route ps_malloc() to PSRAM
    -DCONFIG_SPIRAM_IGNORE_NOTFOUND=1  ; Don't crash if PSRAM not found
    ; Uncomment the line below to enable debug Serial output (increases flash usage)
    ; -DDEBUG_SERIAL
    -I include
    -I lib                                                                                                      
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D LV_CONF_INCLUDE_SIMPLE
    -D USER_SETUP_LOADED
    -D LGFX_USE_V1
    -D SPI_HOST=VSPI_HOST
    -D SPI_FREQUENCY=10000000

; Monitor settings for serial output
monitor_speed = 115200

; Library dependencies for the project
lib_deps = 
    lovyan03/LovyanGFX@^1.2.7
    adafruit/Adafruit BusIO@^1.15.0
    adafruit/DHT sensor library@^1.4.6
    milesburton/DallasTemperature@^3.11.0
    bogde/HX711@^0.7.5

    adafruit/Adafruit GFX Library@^1.11.9
    miguelbalboa/MFRC522@^1.4.10
    lvgl/lvgl@^8.3.11
    zinggjm/GxEPD2@^1.5.8
    ;knolleary/PubSubClient@^2.8

upload_protocol = esptool

[platformio]
include_dir = include
src_dir = src
lib_dir = lib
data_dir = data
